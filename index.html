<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Perspective - TikTok Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%);
            perspective: 1000px;
            overflow: hidden;
        }
        .perspective-card {
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }
        .glow-overlay {
            background: radial-gradient(600px circle at var(--x) var(--y), rgba(255,255,255,0.1), transparent 40%);
        }
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 font-['Inter']">

    <div id="particles-js"></div>

    <div class="relative z-50 mb-12 flex flex-col gap-4 items-center bg-white/5 p-6 rounded-3xl border border-white/10 backdrop-blur-md">
        <input type="text" oninput="updateName(this.value)" placeholder="Magacaaga ku qor..." 
        class="bg-black/40 border border-white/20 rounded-xl px-6 py-3 text-white outline-none focus:border-cyan-500 transition-all w-72 text-center">
        
        <label class="cursor-pointer bg-cyan-600 hover:bg-cyan-500 text-white px-6 py-2 rounded-full text-xs font-bold transition-all uppercase tracking-widest">
            Soo geli Sawirkaaga
            <input type="file" class="hidden" accept="image/*" onchange="previewImage(event)">
        </label>
    </div>

    <div class="perspective-card relative w-[380px] h-[500px] group cursor-pointer" id="card">
        <div class="absolute -inset-4 bg-cyan-500/20 blur-[50px] rounded-[3rem] opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>

        <div class="relative h-full w-full bg-slate-900/80 border border-white/20 rounded-[3rem] p-10 backdrop-blur-xl overflow-hidden shadow-2xl flex flex-col justify-between">
            
            <div class="glow-overlay absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity"></div>

            <div class="relative z-10">
                <div class="w-20 h-20 rounded-2xl overflow-hidden border-2 border-cyan-500/50 shadow-[0_0_20px_rgba(6,182,212,0.3)] mb-8">
                    <img id="profileDisplay" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="w-full h-full object-cover">
                </div>

                <h2 id="displayName" class="font-['Syncopate'] text-3xl font-bold text-white leading-none tracking-tighter uppercase">
                    MUCAAD<br><span class="text-cyan-500">AHMED</span>
                </h2>
                
                <p class="mt-6 text-slate-400 text-sm leading-relaxed">
                    Dhisidda mustaqbalka koodhka. Tani waa 3D Perspective oo lagu dhisay <b>Tailwind CSS</b>. Move your mouse to feel it!
                </p>
            </div>

            <div class="relative z-10 flex flex-col gap-6">
                <div class="flex gap-2">
                    <span class="bg-white/10 px-3 py-1 rounded-md text-[10px] text-cyan-400 font-bold border border-white/5">NEXT.JS</span>
                    <span class="bg-white/10 px-3 py-1 rounded-md text-[10px] text-purple-400 font-bold border border-white/5">NODE.JS</span>
                </div>

                <button class="w-full py-4 bg-white text-black font-black text-xs tracking-[0.3em] rounded-2xl hover:bg-cyan-400 transition-colors uppercase">
                    Follow The Vision
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        const card = document.getElementById('card');
        
        // 3D Tilt Effect
        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            const rotateX = (y - centerY) / 10;
            const rotateY = (centerX - x) / 10;
            
            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            card.style.setProperty('--x', `${x}px`);
            card.style.setProperty('--y', `${y}px`);
        });

        card.addEventListener('mouseleave', () => {
            card.style.transform = `rotateX(0deg) rotateY(0deg)`;
        });

        // Update Functions
        function updateName(val) {
            const nameEl = document.getElementById('displayName');
            if(val.length > 0) {
                const parts = val.split(" ");
                nameEl.innerHTML = `${parts[0]}<br><span class="text-cyan-500">${parts.slice(1).join(" ") || ""}</span>`;
            } else {
                nameEl.innerHTML = `MUCAAD<br><span class="text-cyan-500">AHMED</span>`;
            }
        }

        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = () => {
                document.getElementById('profileDisplay').src = reader.result;
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        // Particles Background Configuration
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80 },
                "color": { "value": "#0ea5e9" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5 },
                "size": { "value": 3 },
                "line_linked": { "enable": true, "distance": 150, "color": "#0ea5e9", "opacity": 0.2, "width": 1 },
                "move": { "enable": true, "speed": 2 }
            }
        });
    </script>
</body>
</html>
